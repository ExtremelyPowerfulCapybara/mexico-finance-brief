# ─────────────────────────────────────────────
#  .github/workflows/newsletter-dev.yml
#
#  Development/testing workflow.
#  - Manual trigger only (no schedule)
#  - Sends only to DEV_SUBSCRIBERS (just you)
#  - Commits to dev branch, not main
#  - Safe to run as many times as needed
# ─────────────────────────────────────────────

name: Newsletter Dev

on:
  workflow_dispatch:
    inputs:
      friday_mode:
        description: "Simulate Friday? (includes word cloud + week review)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev  # always runs on dev branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Write subscribers file
        run: |
          python3 -c "
          import os
          emails = os.environ['DEV_SUBSCRIBERS_CSV'].split(',')
          with open('subscribers.csv', 'w') as f:
              f.write('email,name,active\n')
              for e in emails:
                  e = e.strip()
                  if e:
                      f.write(f'{e},,true\n')
          "
        env:
          DEV_SUBSCRIBERS_CSV: ${{ secrets.DEV_SUBSCRIBERS_CSV }}

      - name: Run newsletter bot
        working-directory: bot
        env:
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER:      ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          SUBSCRIBERS:       ${{ secrets.DEV_SUBSCRIBERS_CSV }}
          BANXICO_API_KEY:   ${{ secrets.BANXICO_API_KEY }}
          FORCE_FRIDAY:      ${{ github.event.inputs.friday_mode }}
        run: python main.py

      - name: Commit and push archive
        run: |
          git config user.name  "Newsletter Bot"
          git config user.email "bot@newsletter"

          git add docs/ digests/

          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "[DEV] Issue: $(date +'%Y-%m-%d')"
            git push origin dev
          fi
