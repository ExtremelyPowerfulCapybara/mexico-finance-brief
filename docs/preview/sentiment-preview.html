<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  body { background: #e8ecef; font-family: Arial, sans-serif; padding: 40px 24px; }

  .archive-card {
    background: #f0f3f5;
    border: 1px solid #cdd4d9;
    padding: 28px 32px;
    max-width: 640px;
    margin: 0 auto;
  }

  .chart-label {
    font-family: Arial, sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #aab4bc;
    margin-bottom: 16px;
  }

  .sc-table { width: 100%; border-collapse: collapse; }
  .sc-day {
    font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: #aab4bc;
    width: 52px; white-space: nowrap;
    padding: 0 8px 8px 0; vertical-align: middle;
  }
  .sc-track-cell { padding: 0 8px 8px 0; vertical-align: middle; }
  .sc-track { background: #e4e9ec; height: 20px; width: 100%; }
  .sc-bar { height: 20px; display: flex; align-items: center; padding-left: 7px; min-width: 4%; }
  .sc-val { font-size: 9px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .sc-label {
    font-size: 9px; font-weight: 700; white-space: nowrap;
    padding: 0 0 8px 0; vertical-align: middle;
    width: 80px; text-align: right;
  }
</style>
</head>
<body>
<div class="archive-card">
  <p class="chart-label">Sentiment Timeline</p>
  <table class="sc-table">
    <tbody>
      <tr>
        <td class="sc-day">Apr 9</td>

        <td class="sc-label" style="color:#e8a030;">Cauteloso</td>
      </tr>

      </tr>
      <tr>

      </tr>

        <td class="sc-label" style="color:#d4695a;">Aversión</td>
      </tr>
      <tr>

</html>
